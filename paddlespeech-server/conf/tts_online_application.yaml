# PaddleSpeech 流式 TTS（本目录独立维护）
# 启动: ./start.sh 或 ../start.sh（与 deskbot-server 一起）
# 与 deskbot-server/config.yaml 的 tts 段、采样率变更时请保持同步

#################################################################################
#                             SERVER SETTING                                    #
#################################################################################
host: 0.0.0.0
port: 8092

protocol: 'websocket'
engine_list: ['tts_online-onnx']


#################################################################################
#                                ENGINE CONFIG                                  #
#################################################################################

################################### TTS #########################################
tts_online:
    am: 'fastspeech2_csmsc'
    am_config:
    am_ckpt:
    am_stat:
    phones_dict:
    tones_dict:
    speaker_dict:

    voc: 'mb_melgan_csmsc'
    voc_config:
    voc_ckpt:
    voc_stat:

    lang: 'zh'
    device: 'cpu'
    am_block: 72
    am_pad: 12
    voc_block: 36
    voc_pad: 14


#################################################################################
tts_online-onnx:
    am: 'fastspeech2_cnndecoder_csmsc_onnx'
    am_ckpt:
    am_stat:
    phones_dict:
    tones_dict:
    speaker_dict:
    am_sample_rate: 24000
    am_sess_conf:
        device: "cpu"
        use_trt: False
        cpu_threads: 4

    voc: 'mb_melgan_csmsc_onnx'
    voc_ckpt:
    voc_sample_rate: 24000
    voc_sess_conf:
        device: "cpu"
        use_trt: False
        cpu_threads: 4

    lang: 'zh'
    am_block: 72
    am_pad: 12
    voc_block: 36
    voc_pad: 14
    voc_upsample: 300
