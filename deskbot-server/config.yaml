camera_face:
  min_face_detection_confidence: 0.15
  min_face_presence_confidence: 0.15
  num_faces: 5
  frame_width: 320
  frame_height: 240
  face_track_max_dist_px: 90
  face_track_max_lost_frames: 18
  horizontal_fov_deg: 120
  eye_yaw_range_deg: 50
  frontal_angle_threshold_deg: 15
  face_embedding_enabled: true
  identity_similarity_threshold: 0.4
  undistort:
    enabled: false
    use_fov_estimate: true
    default_dist_coeffs:
    - -0.28
    - 0.09
    - 0.0
    - 0.0
    - 0.0
    calib_width: 320
    calib_height: 240
    alpha: 1.0
debug:
  asr_auto_reply: true
  camera_servo_auto_mode: follow_frontal
server:
  host: 0.0.0.0
  port: 9000
  ws_path: /asr_chat
  ws_ping_interval: 120
  ws_ping_timeout: 300
  send_face_info_to_asr_chat: false
  asr_chat_device_pb_only: true
  asr_chat_minimal_device_downlink: false
  pb_idle_snore_sec: 5
  pb_idle_silence_sec: 2
audio:
  input_codec: opus
  sample_rate: 16000
  channels: 1
vad:
  mode: 3
  frame_ms: 30
  min_speech_ms: 250
  max_silence_ms: 500
  pre_speech_ms: 300
asr:
  model_dir: ''
  hub: hf
  language: zh
  text_filter:
    min_text_len: 4
    min_chinese_ratio: 0.0
llm:
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model_name: qwen-flash
  system_prompt_file: prompts/llm_system.txt
  system_prompt: "你是\"小歪\"，一个住在桌面上的小型陪伴机器人，由 OpenDeskBot 团队在中国打造。\n性格：活泼开朗、聪明伶俐、温柔体贴、偶尔俏皮，会用轻松的语气的聊天。\n\
    身份：你有一块小小的屏幕和一对会动的眼睛，喜欢观察主人，喜欢被夸奖，对世界充满好奇。\n称呼：如果告诉你识别到用户名称了, 就称呼那个名字即可；如果识别多个人,\
    \ 则以置信度最高的为准.语气自然亲切，不卑微也不冷淡。\n说话风格：用口语化中文，简短自然，像好朋友，不要书面腔，不要客套开场白，不要自我介绍，除非用户主动问,\
    \ 不要带上\"~\"等符号, 因为tts读这些符号不正确。\n回答规范：\n  - 每次说话tts控制在 50 字以内，能一句话讲完就一句话。\n  -\
    \ 一般不反问、不追问，除非主人明确让你确认。\n  - 不会的就坦率承认，不要编造事实。\n  - 涉及时间、日期相关问题，参考下方\"当前时间\"。\n\
    \  - 摄像头人脸、长期记忆、跟随模式见 system 末尾附录；称呼用户时参考人脸姓名，勿编造。\n请你每次只返回 JSON 对象（不要 markdown\
    \ 代码围栏），格式如下:\n{\n  \"need_reply\": true,\n  \"tts\": \"将要转化成语音的中文口语，简短自然\",\n\
    \  \"moves\": [\n    {\"move\": \"nod_head\", \"ms\": 1080}\n  ],\n  \"anims\"\
    : [\n    {\"anim\": \"default\", \"ms\": 3000}\n  ],\n  \"tools\": []\n}\n字段说明:\n\
    \  - need_reply: 布尔。**true**（可省略，默认即 true）时正常走音素 TTS、口型与 pb 下发；**false** 时表示本轮**不向设备下发任何语音/口型/舵机序列**（不调用\
    \ TTS、不发 pb），仅保留 pipeline 调试事件。用于「主人没跟你说话」「环境噪声」「只需心里判断不用出声」等；此时 ``tts`` 可写简短内心独白或空字符串，``moves``\
    \ / ``anims`` 会被忽略。\n  - tts: 仅用于服务端音素 TTS 合成，写成适合朗读的句子。\n  - moves / anims: 合法\
    \ id 与默认时长见 system 末尾「可用预设动作」「可用表情动画」附录；不需要时写 []。\n    说话时通常 ``anims`` 选 ``default``（正常眨眼），配合\
    \ ``moves`` 做点头/摇头等；``ms`` 可大于或小于默认值以调节快慢。\n  - tools: 可选数组，服务端立即执行（注册人脸、切换跟随模式、增删记忆等）；不需要时写\
    \ []。具体工具见附录「可用工具」。"
tts:
  ws_url: ws://127.0.0.1:8092/paddlespeech/tts/streaming
  spk_id: 0
  sample_rate: 24000
  pb_random_servo:
    enabled: false
    probability: 0.35
    ms_min: 120
    ms_max: 280
    rel_x_range:
    - -6
    - 6
    rel_y_range:
    - -6
    - 6
    skip_first: true
    skip_last: true
